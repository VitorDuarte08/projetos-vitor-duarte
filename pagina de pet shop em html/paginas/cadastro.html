<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - PetCare</title>
  <link rel="icon" href="../imagens/imagemlogo.jpg" type="image/x-icon"/>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="top-bar">
    <span>Já tem uma conta? <a href="../index.html.html" style="color: yellow;">Voltar</a></span>
  </div>
  <div class="header">Cadastro - PetCare</div>
  <div class="cadastro-container">
    <h2>Crie sua conta</h2>
    <form>
      <input type="email" placeholder="Seu e-mail" required><br>
      <input type="password" placeholder="Sua senha" required><br>
      <button type="submit">Cadastrar</button>
    </form>
    <button class="google" type="button">Conectar com Google</button>
    <button class="apple" type="button">Conectar com Apple</button>
    <a class="voltar" href="../index.html.html">Voltar para página inicial</a>
  </div>

</html>
