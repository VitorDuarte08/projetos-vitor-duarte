<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Entrar - Loja de Carros de Luxo</title>
    <link rel="stylesheet" href="../css/auth-pages.css">
</head>
<body>
    <img src="../imagens/logo/logo-site.avif" alt="Logo Loja de Carros" class="logo-topo" style="display:block;margin:45px auto 1px auto;width:150px;height:auto;">
    <div class="auth-top-buttons">
        <a href="entrar.html" class="btn-auth-topo">Entrar</a>
        <a href="criar-conta.html" class="btn-auth-topo">Criar Conta</a>
    </div>
    <a href="../index.html" class="btn-voltar">Voltar</a>
    <div class="auth-container">
        <h2>Entrar</h2>
        <form>
            <input type="email" placeholder="E-mail" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit" class="btn-principal">Entrar</button>
        </form>
        <div class="ou-auth">ou</div>
        <button class="btn-social google"><img src="../imagens/logo/logo-google.webp" alt=""> Entrar com Google</button>
        <button class="btn-social apple"><img src="../imagens/logo/logo-apple.png" alt=""> Entrar com Apple</button>
        <div class="trocar-auth">
            Não tem conta? <a href="criar-conta.html">Criar conta</a>
        </div>
    </div>
</body>
</html>
